name: sources

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
      with:
        ref: master
        token: ${{ secrets.PAT_SUBMODULES }}
        submodules: recursive
    - name: upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ github.event.repository.name }}
        path: |
            ${{github.workspace}}
            ${{github.workspace}}/.git
